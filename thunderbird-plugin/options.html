<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI 邮件助手 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #2196F3;
    }
    
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    
    .section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }
    
    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI 邮件助手设置</h1>
    <p class="subtitle">配置您的个人信息和 API 连接</p>
    
    <div class="section">
      <div class="section-title">用户信息</div>
      
      <div class="form-group">
        <label for="userId">用户 ID</label>
        <input type="text" id="userId" placeholder="例如：user001">
        <p class="hint">用于标识您的唯一用户 ID</p>
      </div>
      
      <div class="form-group">
        <label for="userName">用户名称</label>
        <input type="text" id="userName" placeholder="例如：张三">
        <p class="hint">显示在聊天窗口中的名称</p>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">API 配置</div>
      
      <div class="form-group">
        <label for="apiBaseUrl">API 基础地址</label>
        <input type="text" id="apiBaseUrl" placeholder="https://koudai.xin">
        <p class="hint">后端服务地址，例如：https://koudai.xin</p>
      </div>
      
      <div class="form-group">
        <label for="accessPassword">访问密码</label>
        <input type="password" id="accessPassword" placeholder="koudai123">
        <p class="hint">API 访问密码</p>
      </div>
    </div>
    
    <button id="saveBtn">保存设置</button>
    
    <div id="status" class="status"></div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
