<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮件聊天助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app-container">
    <!-- 左侧邮件面板 -->
    <div id="email-panel">
      <div class="email-header">
        <h2>📧 邮件内容</h2>
        <button id="load-email-btn" title="加载邮件">🔄</button>
      </div>
      <div id="email-content">
        <div class="email-meta">
          <div class="email-field">
            <strong>发件人:</strong>
            <span id="email-from">-</span>
          </div>
          <div class="email-field">
            <strong>主题:</strong>
            <span id="email-subject">-</span>
          </div>
          <div class="email-field">
            <strong>日期:</strong>
            <span id="email-date">-</span>
          </div>
        </div>
        <div id="email-body" class="email-body">
          <p class="placeholder-text">点击 🔄 按钮加载当前邮件内容</p>
        </div>
      </div>
    </div>

    <!-- 右侧聊天面板 -->
    <div id="chat-container">
      <!-- 报价侧边栏 -->
      <div id="quotation-sidebar" class="quotation-sidebar" style="display:none;">
        <div class="quotation-sidebar-header">
          <button id="btn-back-to-inquiries" class="btn-back" title="返回我的询价">← 返回</button>
          <h3>📋 询价与报价</h3>
          <button id="btn-close-quotation-sidebar" class="btn-close-sidebar">&times;</button>
        </div>
        <div id="quotation-sidebar-content" class="quotation-sidebar-content">
          <!-- 询价信息区域 -->
          <div id="inquiry-info-section" class="inquiry-info-section" style="display:none;">
            <div class="section-title">📧 询价信息</div>
            <div id="inquiry-info-content"></div>
          </div>
          <!-- 报价列表区域 -->
          <div id="quotation-list-section" class="quotation-list-section">
            <div class="section-title">💰 报价记录</div>
            <div id="quotation-list-content"></div>
          </div>
        </div>
      </div>
      
      <!-- 添加报价侧边栏 -->
      <div id="add-quotation-sidebar" class="quotation-sidebar" style="display:none;">
        <div class="quotation-sidebar-header">
          <h3>➕ 添加报价</h3>
          <button id="btn-close-add-quotation" class="btn-close-sidebar">&times;</button>
        </div>
        <div class="quotation-sidebar-content">
          <div class="form-group">
            <label>关联询价单号 *</label>
            <div class="search-box-wrapper">
              <div class="search-box">
                <input type="text" id="sidebar-inquiry-id" placeholder="输入ID或搜索" />
                <button type="button" id="btn-sidebar-search-inquiry" class="btn-search">搜索</button>
              </div>
              <div id="sidebar-dropdown-inquiry" class="search-dropdown" style="display:none;"></div>
            </div>
            <div id="sidebar-selected-inquiry" class="selected-info" style="display:none;">
              已选择：<strong id="sidebar-selected-inquiry-id"></strong>
              <button type="button" id="btn-sidebar-change-inquiry" class="btn-change">更换</button>
            </div>
          </div>
          
          <div class="form-group">
            <label>供应商 *</label>
            <div class="search-box-wrapper">
              <div class="search-box">
                <input type="text" id="sidebar-supplier-id" placeholder="输入ID或搜索" />
                <button type="button" id="btn-sidebar-search-supplier" class="btn-search">搜索</button>
              </div>
              <div id="sidebar-dropdown-supplier" class="search-dropdown" style="display:none;"></div>
            </div>
            <div id="sidebar-selected-supplier" class="selected-info" style="display:none;">
              已选择：<strong id="sidebar-selected-supplier-name"></strong>
              <button type="button" id="btn-sidebar-change-supplier" class="btn-change">更换</button>
            </div>
          </div>
          
          <div class="form-actions">
            <button id="btn-sidebar-confirm" class="btn-confirm" disabled>确认添加</button>
          </div>
        </div>
      </div>
      
      <!-- 我的询价侧边栏 -->
      <div id="my-inquiries-sidebar" class="quotation-sidebar" style="display:none;">
        <div class="quotation-sidebar-header">
          <h3>📋 我的询价</h3>
          <button id="btn-close-my-inquiries" class="btn-close-sidebar">&times;</button>
        </div>
        <div class="quotation-sidebar-content">
          <div class="search-box-my-inquiries">
            <input type="text" id="my-inquiries-search" placeholder="搜索询价单号、起运港、目的港、货物..." />
            <button id="btn-search-my-inquiries" class="btn-search">搜索</button>
          </div>
          <div id="my-inquiries-content"></div>
        </div>
      </div>
      
      <header class="chat-header">
        <h1>💬 AI 助手</h1>
        <span class="status">在线</span>
      </header>

      <div id="messages" class="messages">
        <div class="message bot">
          <div class="avatar">🤖</div>
          <div class="content">
            <p>你好！我是 AI 助手。我可以帮你分析邮件内容、回答问题或提供建议。有什么我可以帮你的吗？</p>
          </div>
        </div>
      </div>

      <div class="input-area">
        <textarea id="user-input" placeholder="输入消息，或询问关于邮件的问题..." rows="1"></textarea>
        <button id="send-btn">发送</button>
      </div>
      <div class="quick-actions">
        <button id="btn-add-inquiry" title="添加询价">➕ 添加询价</button>
        <button id="btn-my-inquiries" title="我的询价">📋 我的询价</button>
      </div>
    </div>
  </div>

  <!-- 搜索选择弹窗（已废弃，改用下拉） style="display:none;" -->
  <div id="search-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">搜索</h3>
        <button id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="输入关键词搜索..." />
        </div>
        <div id="search-results" class="search-results"></div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- 添加报价表单弹窗 -->
  <div id="form-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加报价</h3>
        <button id="form-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="selected-inquiry" class="selected-info" style="display:none;">
          已选择询价单：<strong id="selected-inquiry-id"></strong>
          <button type="button" id="btn-change-inquiry" style="margin-left:8px;padding:2px 8px;font-size:11px;">更换</button>
        </div>
        <div id="selected-supplier" class="selected-info" style="display:none;">
          已选择供应商：<strong id="selected-supplier-id"></strong>
          <button type="button" id="btn-change-supplier" style="margin-left:8px;padding:2px 8px;font-size:11px;">更换</button>
        </div>
        
        <div class="form-group">
          <label>关联询价单号 *</label>
          <div style="position:relative;">
            <div style="display:flex;gap:8px;">
              <input type="text" id="form-inquiry-id" placeholder="输入ID或搜索" style="flex:1;" />
              <button type="button" id="btn-search-inquiry" class="btn-search">搜索</button>
            </div>
            <div id="dropdown-inquiry" class="search-dropdown" style="display:none;"></div>
          </div>
        </div>
        
        <div class="form-group">
          <label>供应商 *</label>
          <div style="position:relative;">
            <div style="display:flex;gap:8px;">
              <input type="text" id="form-supplier-id" placeholder="输入ID或搜索" style="flex:1;" />
              <button type="button" id="btn-search-supplier" class="btn-search">搜索</button>
            </div>
            <div id="dropdown-supplier" class="search-dropdown" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="form-cancel">取消</button>
        <button id="form-confirm" class="btn-confirm" disabled>确认添加</button>
      </div>
    </div>
  </div>

  <script type="module" src="./chat-window.js"></script>
</body>
</html>
