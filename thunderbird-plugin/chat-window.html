<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 邮件助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100%;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      overflow: hidden;
      background: #fff;
    }
    
    #email-panel {
      width: 300px;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #email-header {
      padding: 15px;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
    }
    
    #email-header h3 {
      margin-bottom: 10px;
      font-size: 15px;
      color: #212529;
      word-break: break-word;
    }
    
    #email-header p {
      margin: 5px 0;
      color: #6c757d;
      font-size: 13px;
    }
    
    #email-content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #212529;
    }
    
    #email-content .body-text {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e9ecef;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f5f7fb;
    }
    
    #chat-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="email-panel">
    <div id="email-header">
      <h3 id="email-subject">当前邮件</h3>
      <p id="email-from">发件人：-</p>
      <p id="email-date">日期：-</p>
    </div>
    <div id="email-content">
      <div class="body-text" id="email-body">
        <p style="color: #6c757d;">正在加载邮件内容...</p>
      </div>
    </div>
  </div>
  <div id="chat-panel">
    <iframe id="chat-frame" src="https://koudai.xin/chat.html"></iframe>
  </div>
  <script src="chat-window.js"></script>
</body>
</html>
