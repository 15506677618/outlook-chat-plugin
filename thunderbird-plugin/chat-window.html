<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 邮件助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100%;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      overflow: hidden;
      background: #fff;
    }
    
    #email-panel {
      width: 350px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #email-header {
      padding: 15px;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
    }
    
    #email-header h3 {
      margin-bottom: 12px;
      font-size: 16px;
      color: #212529;
      font-weight: 600;
    }
    
    #email-header .email-meta {
      margin-bottom: 8px;
      font-size: 13px;
      color: #6c757d;
    }
    
    #email-header .email-meta:last-child {
      margin-bottom: 0;
    }
    
    #email-header .email-meta strong {
      margin-right: 6px;
    }
    
    #email-content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #212529;
    }
    
    #email-content .body-text {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #dee2e6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #chat-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    #chat-header h2 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    #chat-header .status {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 12px;
    }
    
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f5f7fb;
    }
    
    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    
    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .message.user .avatar {
      background: #667eea;
    }
    
    .message.bot .avatar {
      background: #e0e0e0;
    }
    
    .message .content {
      padding: 8px 12px;
      border-radius: 18px;
      line-height: 1.3;
      font-size: 14px;
    }
    
    .message .content p {
      margin: 0 0 4px 0;
      line-height: 1.3;
    }
    
    .message .content p:last-child {
      margin-bottom: 0;
    }
    
    .message .content br {
      display: block;
      content: "";
      margin: 2px 0;
    }
    
    /* 消除列表项之间的空白 */
    .message .content ul,
    .message .content ol {
      margin: 4px 0;
      padding-left: 20px;
    }
    
    .message .content li {
      margin: 2px 0;
      line-height: 1.3;
    }
    
    /* 移除空白文本节点的影响 */
    .message .content * {
      white-space: normal;
    }
    
    .message.user .content {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 6px;
    }
    
    .message.bot .content {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 6px;
    }
    
    .message .content p {
      word-wrap: break-word;
      margin: 0;
    }
    
    #input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    
    /* 快捷键按钮区域 */
    #quick-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .quick-btn {
      padding: 6px 12px;
      background: #f5f7fb;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      font-size: 12px;
      color: #667eea;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .quick-btn:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    
    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    
    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      resize: none;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      min-height: 40px;
      max-height: 100px;
      transition: border-color 0.2s;
    }
    
    #user-input:focus {
      border-color: #667eea;
    }
    
    .action-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    #send-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    #send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
    }
    
    #cancel-btn {
      background: #ff6b6b;
      color: white;
      display: none;
    }
    
    #cancel-btn:hover {
      background: #ff5252;
      transform: translateY(-1px);
    }
    
    #cancel-btn.visible {
      display: block;
    }
    
    #send-btn.hidden {
      display: none;
    }
    
    .typing {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: white;
      border-radius: 18px;
      width: fit-content;
      border: 1px solid #e0e0e0;
    }
    
    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* 侧边面板样式 */
    .side-panel {
      position: absolute;
      top: 60px;
      right: -350px;
      width: 320px;
      height: calc(100% - 60px);
      background: white;
      border-left: 1px solid #e0e0e0;
      box-shadow: -2px 0 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: right 0.3s ease;
    }
    
    .side-panel.open {
      right: 0;
    }
    
    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-header h3 {
      font-size: 16px;
      color: #333;
    }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
    }
    
    .close-btn:hover {
      color: #333;
    }
    
    .panel-search {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .panel-search input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      font-size: 13px;
      outline: none;
    }
    
    .panel-search input:focus {
      border-color: #667eea;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .inquiry-item {
      padding: 12px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .inquiry-item:hover {
      background: #f8f9fa;
      border-color: #667eea;
    }
    
    .inquiry-item .inquiry-id {
      font-size: 12px;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .inquiry-item .inquiry-route {
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
    }
    
    .inquiry-item .inquiry-cargo {
      font-size: 12px;
      color: #666;
    }
    
    .inquiry-item .inquiry-date {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    
    /* 滚动条样式 */
    #email-content::-webkit-scrollbar,
    #messages::-webkit-scrollbar,
    .panel-content::-webkit-scrollbar {
      width: 8px;
    }
    
    #email-content::-webkit-scrollbar-track,
    #messages::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    
    #email-content::-webkit-scrollbar-thumb,
    #messages::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }
    
    #email-content::-webkit-scrollbar-thumb:hover,
    #messages::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>
<body>
  <!-- 左侧邮件面板 -->
  <div id="email-panel">
    <div id="email-header">
      <h3>📧 当前邮件</h3>
      <div class="email-meta">
        <strong>发件人:</strong>
        <span id="email-from">-</span>
      </div>
      <div class="email-meta">
        <strong>日期:</strong>
        <span id="email-date">-</span>
      </div>
    </div>
    <div id="email-content">
      <div class="body-text" id="email-body">
        <p style="color: #6c757d;">正在加载邮件内容...</p>
      </div>
    </div>
  </div>
  
  <!-- 右侧聊天面板 -->
  <div id="chat-panel">
    <div id="chat-header">
      <h2>💬 AI 邮件助手</h2>
      <span class="status">在线</span>
    </div>
    
    <!-- 询价列表面板 -->
    <div id="inquiry-panel" class="side-panel">
      <div class="panel-header">
        <h3>📋 询价列表</h3>
        <button id="close-inquiry-panel" class="close-btn">✕</button>
      </div>
      <div class="panel-search">
        <input type="text" id="inquiry-search" placeholder="搜索询价...">
      </div>
      <div class="panel-content" id="inquiry-list">
        <!-- 询价列表项将在这里动态生成 -->
      </div>
    </div>
    
    <div id="messages">
      <div class="message bot">
        <div class="avatar">🤖</div>
        <div class="content">
          <p>你好！我是 AI 邮件助手。我可以帮你分析邮件内容、回答问题或提供建议。有什么我可以帮你的吗？</p>
        </div>
      </div>
    </div>
    
    <div id="input-area">
      <!-- 快捷键按钮 -->
      <div id="quick-buttons">
        <button class="quick-btn" data-text="添加询价记录">➕ 添加询价</button>
        <button class="quick-btn" data-text="添加报价信息">💰 添加报价</button>
        <button class="quick-btn" data-text="总结要点">📝 总结要点</button>
        <button class="quick-btn" id="inquiry-list-btn">📋 询价列表</button>
      </div>
      <!-- 输入行 -->
      <div id="input-row">
        <textarea id="user-input" placeholder="输入消息..."></textarea>
        <button id="send-btn" class="action-btn">发送</button>
        <button id="cancel-btn" class="action-btn">取消</button>
      </div>
    </div>
  </div>
  
  <script src="chat-window.js"></script>
</body>
</html>
