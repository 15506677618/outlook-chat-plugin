<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 900px;
      height: 650px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      overflow: hidden;
      background: #fff;
    }
    
    #email-panel {
      width: 350px;
      background: #f8f9fa;
      border-right: 1px solid #dee2e6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #email-header {
      padding: 15px;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
    }
    
    #email-header h3 {
      margin-bottom: 10px;
      font-size: 15px;
      color: #212529;
      word-break: break-word;
    }
    
    #email-header p {
      margin: 5px 0;
      color: #6c757d;
      font-size: 13px;
    }
    
    #email-content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: #212529;
    }
    
    #email-content .body-text {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e9ecef;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #chat-header {
      padding: 12px 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    #chat-header .status {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    #chat-frame {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="email-panel">
    <div id="email-header">
      <h3>邮件内容</h3>
      <p id="email-author">发件人：加载中...</p>
      <p id="email-date">日期：-</p>
    </div>
    <div id="email-content">
      <p style="color: #6c757d;">请选择一封邮件查看内容...</p>
    </div>
  </div>
  <div id="chat-panel">
    <div id="chat-header">
      <span>🤖 AI 聊天助手</span>
      <span class="status">在线</span>
    </div>
    <iframe id="chat-frame" src="https://koudai.xin/chat.html"></iframe>
  </div>
  <script src="popup.js"></script>
</body>
</html>
